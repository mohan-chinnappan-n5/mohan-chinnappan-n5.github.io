<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
       .popover-header {
           background-color: aqua;
       }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-info">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Project Management</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
             
            </ul>
          </div>
        </div>
      </nav>
      <blockquote class="blockquote text-center text-success" style="background-color: #eef;">
        <i>Job of the product manager is to discover a product that is valuable, usable and feasible -  Marty Cagan
       <br> Product Manager is the CEO of the product - Ben Horowitz</i>
    </blockquote>


<div class="row">
 

    <div class="col-lg">
        <img src="../book/img/pm-venn-1.svg" width="100%" usemap="#image-map"/>

        <map name="image-map">
            <area target="" alt="ux" title="ux" id='uxmap' href="#" coords="185,245,112" shape="circle">
            <area target="" alt="tech" title="tech" id='techmap' href="#" coords="565,251,252" shape="circle">
            <area target="" alt="biz" title="biz"   id='bizmap'  href="#" coords="406,548,224" shape="circle">

        </map>


    </div>
    <div class="col-lg">

         <div id='btn-group' style='padding:10px;display:none;'>
          <button type="button" id='UX' class="btn btn-lg btn-danger" data-bs-toggle="popover" title="UX" 
          data-html="true"   >UX</button>
          <button type="button" id='Tech' class="btn btn-lg btn-success" data-bs-toggle="popover" title="Tech" 
          data-html="true"   >Tech</button>
          <button type="button" id='Biz' class="btn btn-lg btn-primary" data-bs-toggle="popover" title="Biz" 
          data-html="true"   >Biz</button>
          </div>
          <table class="table">
            <tr>
              <th>Good</th><th>Bad</th>
            </tr>
          </table>

        
    </div>
    
</div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

  <script>
    var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'))
    var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
      return new bootstrap.Popover(popoverTriggerEl, {html: true})
    })


    const ux = `
          <div class='row'>
            <div class='col-lg'>
            
          <ul class="group-list">
              <li class="group-list-item">be the voice of the user inside the business</li>
                  <li class="group-list-item"> get user feedback first hand</li>
          </ul>
        </div>
        
    </div>
    `;

    const biz = `
    <div class='row'>
      <div class='col-lg'>
      
    <ul class="group-list">
        <li class="group-list-item">focus on maximizing business value from the product</li>
            <li class="group-list-item">obsessed with optimizing the product to achieve the business goals while maximizing return on investment (ROI)</li>
    </ul>
  </div>
  
</div>
`;
const tech = `
<div class='row'>
  <div class='col-lg'>
  
<ul class="group-list">
    <li class="group-list-item">there’s no point defining what to build if you don’t know how it will get built</li>
        <li class="group-list-item">understanding the level of effort (LOE) involved is crucial to making the right decisions</li>
</ul>
</div>

</div>
`;

   const uxEle =  document.getElementById('UX');
   const techEle =  document.getElementById('Tech');
   const bizEle =  document.getElementById('Biz');
   const btnGroupEle = document.getElementById('btn-group');



   uxEle.dataset.bsContent = ux;
 
   techEle.dataset.bsContent = tech; 
   bizEle.dataset.bsContent = biz; 

   /*
   bizEle.click();
   techEle.click();
   uxEle.click();
   */

   const techMapEle = document.getElementById('techmap');
   techMapEle.addEventListener('click', event => {
    techEle.click();
    btnGroupEle.style.display = 'block';
   })

   const bizMapEle = document.getElementById('bizmap');
   bizMapEle.addEventListener('click', event => {
    bizEle.click();
    btnGroupEle.style.display = 'block';

   })

   const uxMapEle = document.getElementById('uxmap');
   uxMapEle.addEventListener('click', event => {
    uxEle.click();
    btnGroupEle.style.display = 'block';

   })


  </script>   
</body>
</html>
